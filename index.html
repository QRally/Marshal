<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRally Marshal Scanner v1.2</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --bg: #000; --accent: #ffcc00; --pass: #2ecc71; --card: #1a1a1a; --info: #3498db; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        h1 { color: var(--accent); font-weight: 800; margin-bottom: 15px; }
        
        #video-container { position: relative; width: 100%; max-width: 400px; margin: 0 auto; border: 4px solid #333; border-radius: 15px; overflow: hidden; background: #222; aspect-ratio: 1/1; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* New Total Time Display */
        #total-result { display: none; background: var(--card); border: 2px solid var(--pass); border-radius: 12px; padding: 15px; margin-top: 20px; box-shadow: 0 0 20px rgba(46, 204, 113, 0.3); }
        .total-label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .total-val { font-size: 2.2rem; font-family: monospace; color: var(--pass); font-weight: bold; }

        #table-area { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: #333; color: var(--accent); padding: 10px; font-size: 0.7rem; }
        td { border-bottom: 1px solid #333; padding: 10px; font-family: monospace; font-size: 0.9rem; }
        
        .reset-btn { background: var(--accent); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; display: none; width: 100%; max-width: 400px; }
        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 0 15px var(--accent); animation: scan 2.5s infinite linear; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body>

    <h1>MARSHAL SCANNER v1.2</h1>

    <div id="video-container">
        <div id="laser" class="scan-line"></div>
        <video id="video"></video>
    </div>

    <div id="total-result">
        <div class="total-label">Final Rally Total</div>
        <div id="final-time" class="total-val">00:00.000</div>
    </div>

    <div id="table-area">
        <div id="table-output"></div>
        <button id="reset-btn" class="reset-btn" onclick="resetScanner()">🔄 NEXT COMPETITOR</button>
    </div>

    <script>
        const codeReader = new ZXing.BrowserQRCodeReader();
        const videoElement = document.getElementById('video');
        let isScanning = true;

        function startScanning() {
            codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                if (result && isScanning) {
                    isScanning = false;
                    processResult(result.text);
                }
            });
        }

        function processResult(scannedText) {
            // Data: "TOTAL:00:00.000|Time,Split|Time,Split..."
            const mainParts = scannedText.split('|');
            const totalStr = mainParts[0].replace('TOTAL:', '');
            const checkpoints = mainParts.slice(1);
            
            // 1. Show Total Header
            document.getElementById('final-time').innerText = totalStr;
            document.getElementById('total-result').style.display = 'block';

            // 2. Build Table
            let html = `<table><tr><th>CP</th><th>TIME</th><th>SPLIT</th></tr>`;
            checkpoints.forEach((row, i) => {
                const parts = row.split(',');
                html += `<tr>
                            <td>${i + 1}</td>
                            <td style="color:var(--pass)">${parts[0]}</td>
                            <td style="color:var(--accent)">${parts[1]}</td>
                         </tr>`;
            });
            html += `</table>`;
            
            document.getElementById('table-output').innerHTML = html;
            document.getElementById('laser').style.display = "none";
            document.getElementById('reset-btn').style.display = "inline-block";
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        function resetScanner() {
            document.getElementById('total-result').style.display = 'none';
            document.getElementById('table-output').innerHTML = "";
            document.getElementById('laser').style.display = "block";
            document.getElementById('reset-btn').style.display = "none";
            isScanning = true;
        }

        window.onload = startScanning;
    </script>
</body>
</html>
